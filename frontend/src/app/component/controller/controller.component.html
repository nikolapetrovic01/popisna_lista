<app-header></app-header>
<div class="main-content">
  <div class="content-grid">
    <div class="left-column">

    <!-- Always visible list for Aktivni Items -->
    <div class="active-list">
      <div class="active-list-header d-flex align-items-center justify-content-between mb-3">
        <h3 class="text-center w-100">AKTIVNI</h3>
        <button id="new-button" class="small-button float-end" (click)="navigateToCreateNewInventory()">
          NAPRAVI NOVI
        </button>
      </div>

      <!-- Search filters -->
      <form class="row align-items-center my-3">
        <div class="col-md-6 text-center">
          <label class="form-label text-white" for="startDate">Početni Datum</label>
          <input type="date" class="form-control text-center" id="startDate" (change)="filterItems()">
        </div>
        <div class="col-md-6 text-center">
          <label class="form-label text-white" for="endDate">Krajnji Datum</label>
          <input type="date" class="form-control text-center" id="endDate" (change)="filterItems()">
        </div>
      </form>

      <div class="active-items">
        <app-dropdown-item *ngFor="let item of filteredActiveItems" [item]="item" (click)="navigateToInventoryClicked(item)"></app-dropdown-item>
      </div>
    </div>

    <!-- Dropdown for Neaktivni (Inactive) Items -->
    <div class="inactive-list">
      <button id="inactive-button" class="dropbtn" (click)="toggleDropdown('inactive')">
        NEAKTIVNI
      </button>
      <div *ngIf="isInactiveOpen" class="dropdown-content">
        <app-dropdown-item *ngFor="let item of inactiveItems" [item]="item" (click)="navigateToInventoryClicked(item)"></app-dropdown-item>
      </div>
    </div>
  </div>
<!-- Pie Chart -->
    <div class="right-column">
      <div class="chart-card">
        <h3 class="chart-title">STATUS POPISA</h3>

        <div class="chart-wrapper" *ngIf="inventoryState; else noChartData">
          <canvas
            baseChart
            [type]="pieChartType"
            [data]="pieChartData"
            [options]="pieChartOptions">
          </canvas>
        </div>

        <ng-template #noChartData>
          <div class="chart-placeholder">
            Odaberite aktivni popis da se prikaže chart.
          </div>
        </ng-template>
      </div>
    </div>

  </div>
</div>
